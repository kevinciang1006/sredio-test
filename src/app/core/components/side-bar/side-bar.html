<aside
  [class]="'fixed top-0 left-0 z-40 h-screen pt-14 bg-white border-r border-gray-200 transition-[width] duration-300 ease-in-out ' + (collapsed() ? 'w-16' : 'w-64')"
  aria-label="Sidenav">
  <div class="py-5 px-3 h-full">
    <ul class="space-y-1 list-none m-0 p-0">
      <li class="relative group">
        <a
          [routerLink]="['/tenant', tenantId(), 'dashboard']"
          routerLinkActive
          #dashRla="routerLinkActive"
          [class]="'flex items-center p-2 rounded-lg transition-colors hover:bg-gray-100 ' + (dashRla.isActive ? 'bg-blue-50 text-blue-700' : 'text-gray-900')">
          <svg class="w-6 h-6 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"></path>
            <path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"></path>
          </svg>
          <span [class]="'overflow-hidden whitespace-nowrap text-base font-medium transition-all duration-300 ease-in-out ' + (collapsed() ? 'max-w-0 opacity-0 pl-0' : 'max-w-52 opacity-100 pl-3')">
            Dashboard
          </span>
        </a>
        @if (collapsed()) {
          <div class="absolute left-full top-1/2 -translate-y-1/2 ml-3 px-2 py-1.5 bg-gray-900 text-white text-xs font-medium rounded whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity duration-150 pointer-events-none z-50">
            Dashboard
          </div>
        }
      </li>
      <li class="relative group">
        <a
          [routerLink]="['/tenant', tenantId(), 'profile']"
          routerLinkActive
          #profileRla="routerLinkActive"
          [class]="'flex items-center p-2 rounded-lg transition-colors hover:bg-gray-100 ' + (profileRla.isActive ? 'bg-blue-50 text-blue-700' : 'text-gray-900')">
          <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <span [class]="'overflow-hidden whitespace-nowrap text-base font-medium transition-all duration-300 ease-in-out ' + (collapsed() ? 'max-w-0 opacity-0 pl-0' : 'max-w-52 opacity-100 pl-3')">
            Profile
          </span>
        </a>
        @if (collapsed()) {
          <div class="absolute left-full top-1/2 -translate-y-1/2 ml-3 px-2 py-1.5 bg-gray-900 text-white text-xs font-medium rounded whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity duration-150 pointer-events-none z-50">
            Profile
          </div>
        }
      </li>
    </ul>
  </div>
</aside>
