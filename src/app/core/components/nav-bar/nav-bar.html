<header class="bg-white border-b border-gray-200 px-6 py-3">
  <div class="relative inline-block">
    <button
      type="button"
      (click)="toggleDropdown()"
      class="flex items-center gap-2 text-xl font-semibold text-blue-600 hover:text-blue-700 focus:outline-none">
      <span class="inline-flex w-8 h-8 rounded bg-blue-600 text-white items-center justify-center text-sm font-bold">S</span>
      sred.io
      <svg class="w-4 h-4 text-gray-400 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </button>

    @if (isOpen()) {
      <div class="absolute left-0 mt-2 w-64 rounded-lg shadow-lg bg-white border border-gray-200 z-50">
        @if (currentUser(); as u) {
          <div class="px-4 py-3 flex items-center gap-3">
            <app-avatar [name]="u.name" size="lg" />
            <div class="min-w-0">
              <p class="text-sm font-semibold text-gray-900 truncate">{{ u.name }}</p>
              <p class="text-xs text-gray-500 truncate">{{ u.email }}</p>
            </div>
          </div>
        }
        <hr class="border-gray-100" />
        <a
          routerLink="/profile"
          (click)="isOpen.set(false)"
          class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          My Profile
        </a>
        <hr class="border-gray-100" />
        <button
          type="button"
          (click)="logout()"
          class="flex w-full items-center gap-2 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Sign out
        </button>
      </div>
    }
  </div>
</header>
