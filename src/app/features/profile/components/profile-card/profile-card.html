<section class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
  @if (isLoading() || !profile()) {
    <div class="animate-pulse space-y-3">
      <div class="flex items-center gap-4">
        <div class="w-16 h-16 bg-gray-200 rounded-full"></div>
        <div class="space-y-2">
          <div class="h-5 bg-gray-200 rounded w-40"></div>
          <div class="h-4 bg-gray-200 rounded w-24"></div>
        </div>
      </div>
      <div class="h-4 bg-gray-200 rounded w-1/2 mt-2"></div>
    </div>
  } @else if (profile(); as p) {
    <div class="flex items-start gap-5">
      <app-avatar [name]="p.name" size="lg" />
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-3 flex-wrap">
          <h1 class="text-2xl font-semibold text-gray-900">{{ p.name }}</h1>
          <app-badge [label]="p.role" variant="blue" />
        </div>
        <p class="text-sm text-gray-500 mt-0.5">{{ p.email }}</p>
        <p class="text-sm text-gray-500 mt-0.5">
          Joined <span class="text-gray-700 font-medium">{{ p.hireDate | shortDate }}</span>
        </p>
      </div>
    </div>

    <dl class="mt-6 grid grid-cols-2 sm:grid-cols-3 gap-4">
      <div class="bg-gray-50 rounded-lg p-4">
        <dt class="text-xs uppercase tracking-wide text-gray-500 font-medium">YTD Hours</dt>
        <dd class="mt-1 text-2xl font-semibold text-gray-900">{{ ytdHours() | number:'1.0-0' }}</dd>
      </div>
      <div class="bg-gray-50 rounded-lg p-4">
        <dt class="text-xs uppercase tracking-wide text-gray-500 font-medium">YTD Cost</dt>
        <dd class="mt-1 text-2xl font-semibold text-gray-900">{{ ytdCost() | currency:'CAD':'symbol-narrow':'1.0-0' }}</dd>
      </div>
      <div class="bg-gray-50 rounded-lg p-4">
        <dt class="text-xs uppercase tracking-wide text-gray-500 font-medium">Active Projects</dt>
        <dd class="mt-1 text-2xl font-semibold text-gray-900">{{ activeProjectCount() }}</dd>
      </div>
    </dl>
  }
</section>
