@if (total() === 0) {
  <p class="text-sm text-gray-400 py-8 text-center">No data for this period.</p>
} @else {
  <div
    echarts
    [options]="chartOption()"
    (chartInit)="onChartInit($event)"
    (chartClick)="onChartClick($event)"
    class="block w-full"
    style="height: 300px">
  </div>
}
