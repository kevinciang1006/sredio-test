<section class="bg-white rounded-lg shadow-sm border border-gray-200 p-5">
  @if (isLoading() || !client()) {
    <div class="animate-pulse h-7 bg-gray-200 rounded w-1/3"></div>
  } @else if (client(); as c) {
    <div class="flex items-baseline gap-3">
      <h1 class="text-2xl font-semibold text-gray-900">{{ c.name }}</h1>
      <span class="text-sm text-gray-500">· Province <span class="font-medium text-gray-700">{{ c.province }}</span></span>
    </div>
  }
</section>
