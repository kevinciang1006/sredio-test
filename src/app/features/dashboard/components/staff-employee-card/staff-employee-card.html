<div
  role="button"
  tabindex="0"
  [attr.aria-label]="'View details for ' + entry().name"
  class="border border-gray-200 rounded-[10px] p-3 cursor-pointer flex flex-col items-center gap-1.5 bg-gray-50 hover:bg-white hover:border-blue-500 hover:shadow-md transition-all"
  (click)="viewDetails.emit()"
  (keydown.enter)="viewDetails.emit()"
  (keydown.space)="$event.preventDefault(); viewDetails.emit()">
  <!-- SVG half-circle gauge -->
  <svg viewBox="0 0 80 52" class="w-full" aria-hidden="true">
    <!-- Track layer -->
    <path
      d="M4,44 A36,36 0 0,1 76,44"
      stroke="#e5e7eb"
      stroke-width="8"
      fill="none"
      stroke-linecap="round"
      stroke-dasharray="113 0" />
    <!-- Unclaimed fill layer (20% opacity) -->
    <path
      d="M4,44 A36,36 0 0,1 76,44"
      [attr.stroke]="lightColor()"
      stroke-width="8"
      fill="none"
      stroke-linecap="round"
      stroke-dasharray="113 0" />
    <!-- SR&ED arc layer -->
    <path
      d="M4,44 A36,36 0 0,1 76,44"
      [attr.stroke]="entry().color"
      stroke-width="8"
      fill="none"
      stroke-linecap="round"
      [attr.stroke-dasharray]="sreddash() + ' ' + remaining()" />
    <!-- Center text: SR&ED value -->
    <text x="40" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">{{ sredDisplay() }}</text>
    <text x="40" y="50" text-anchor="middle" font-size="6.5" fill="#9ca3af">{{ gaugeLabel() }}</text>
  </svg>

  <!-- Avatar + Name row -->
  <div class="flex items-center gap-1.5 w-full">
    <app-avatar [name]="entry().name" [color]="entry().color" size="sm" />
    <div>
      <span class="text-sm font-medium text-gray-800 overflow-hidden text-ellipsis whitespace-nowrap min-w-0 flex-1">{{ entry().name }}</span>
      <!-- Unclaimed sub-label -->
      @if (mode() !== 'credits') {
        <p class="text-xs text-gray-400 self-start">{{ unclaimedDisplay() }}</p>
      }
    </div>
  </div>


  <!-- View Details button -->
  <button
    type="button"
    class="w-full text-xs font-medium rounded-md px-2 py-1 mt-auto"
    [style.color]="entry().color"
    [style.backgroundColor]="buttonBg()"
    (click)="$event.stopPropagation(); viewDetails.emit()">
    View Details →
  </button>
</div>
